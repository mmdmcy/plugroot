name: plugroot-vaultwarden

services:
  vaultwarden:
    image: ghcr.io/dani-garcia/vaultwarden:1.36.0@sha256:d626d04934cd1192ad8ced1adb975099fca78cec33ab467d2d3c923cde7f3b0c
    container_name: plugroot-vaultwarden
    user: "${PUID:-1000}:${PGID:-1000}"
    restart: unless-stopped
    environment:
      DOMAIN: "${VAULTWARDEN_DOMAIN:?set VAULTWARDEN_DOMAIN}"
      ENABLE_WEBSOCKET: "true"
      SIGNUPS_ALLOWED: "${VAULTWARDEN_SIGNUPS_ALLOWED:-false}"
      INVITATIONS_ALLOWED: "false"
      ORG_CREATION_USERS: "none"
      EMERGENCY_ACCESS_ALLOWED: "false"
      SENDS_ALLOWED: "false"
      PASSWORD_HINTS_ALLOWED: "false"
      SHOW_PASSWORD_HINT: "false"
      ROCKET_ADDRESS: "0.0.0.0"
      ROCKET_PORT: "80"
    volumes:
      - ${PLUGROOT_ROOT:-/opt/plugroot}/services/vaultwarden/data:/data
    ports:
      - "127.0.0.1:${VAULTWARDEN_HTTP_PORT:-8089}:80/tcp"
    labels:
      plugroot.service: "vaultwarden"
      plugroot.role: "password-manager"
