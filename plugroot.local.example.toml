# Copy to plugroot.local.toml for one machine. Keep the copy out of Git.

[host]
name = "example-host"
private_ip = "127.0.0.1"
user = "plugroot"

[[service]]
id = "example-port"
name = "Example Port"
plane = "private"
category = "example"
kind = "port"
host = "127.0.0.1"
port = 8080
url = "http://127.0.0.1:8080"
description = "Example local listener."
controls = []
ports = ["8080/tcp local"]
optional = true

[[service]]
id = "example-compose"
name = "Example Compose"
plane = "private"
category = "example"
kind = "compose"
path = "examples/compose"
url = "http://${PLUGROOT_PRIVATE_IP:-127.0.0.1}:${EXAMPLE_WEB_PORT:-8080}"
description = "Example Docker Compose stack."
containers = ["plugroot-example-web"]
controls = ["start", "stop", "restart", "logs"]
ports = ["${EXAMPLE_WEB_PORT:-8080}/tcp"]
optional = true
